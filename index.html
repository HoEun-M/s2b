<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S2B 검색 결과 확인하기</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#1f2933;font-family:"Malgun Gothic",Arial,sans-serif;font-size:14px}button,input,select{font:inherit}.app{max-width:1340px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}h1{margin:0 0 6px;font-size:24px;letter-spacing:0}h2{margin:0 0 12px;font-size:16px}h3{margin:0 0 8px;font-size:13px;color:#52616f}p{margin:0;color:#667085}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab,.btn{border:1px solid #cfd7e2;background:#fff;color:#344054;border-radius:8px;padding:9px 13px;cursor:pointer}.tab.active,.btn.primary{background:#1f5f99;color:#fff;border-color:#1f5f99}.btn.warn{border-color:#efb5ac;color:#a43b2d;background:#fff7f5}.btn:disabled{opacity:.55;cursor:not-allowed}.panel{display:none}.panel.active{display:block}.section{background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:16px;margin-bottom:14px}.upload{display:grid;grid-template-columns:minmax(300px,430px) 1fr;gap:14px}.drop{border:1.5px dashed #9fb3c8;border-radius:8px;padding:18px;background:#fbfdff;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:10px}.file{width:100%;border:1px solid #cfd7e2;border-radius:8px;padding:10px;background:#fff}.status{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px;color:#667085;font-size:12px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{border:1px solid #e4e9ef;background:#fbfcfd;border-radius:8px;padding:12px;min-height:70px}.metric span{color:#667085;font-size:12px}.metric strong{display:block;margin-top:4px;font-size:24px;color:#1f2933}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}.toolbar input,.toolbar select{height:36px;border:1px solid #cfd7e2;border-radius:8px;padding:0 10px;background:#fff}.toolbar input{min-width:260px}.toolbar input[type=date]{min-width:150px}.toolbar input[type=checkbox]{width:16px;height:16px;min-width:0;padding:0}.check{display:inline-flex;align-items:center;gap:6px;height:36px;border:1px solid #cfd7e2;background:#fff;border-radius:8px;padding:0 10px;white-space:nowrap}.filters{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}.keyword-box{border:1px solid #dde3ea;background:#fbfcfd;border-radius:8px;padding:10px}.keyword-list{display:flex;flex-wrap:wrap;gap:6px}.keyword-list label{display:inline-flex;align-items:center;gap:5px;border:1px solid #c9def5;background:#eef4ff;color:#184f83;border-radius:999px;padding:5px 9px;font-size:12px}.keyword-list input{width:14px;height:14px}.table-wrap{overflow:auto;border:1px solid #dde3ea;border-radius:8px;background:#fff}table{width:100%;min-width:1140px;border-collapse:collapse}th{position:sticky;top:0;background:#1f5f99;color:#fff;text-align:left;font-size:12px;font-weight:700;padding:10px;z-index:1}td{border-bottom:1px solid #edf1f5;padding:9px 10px;vertical-align:top}tr:hover td{background:#f8fbff}.num{text-align:right;white-space:nowrap}.center{text-align:center}.muted{color:#667085;font-size:12px}.link{color:#145ea8;text-decoration:none}.tag{display:inline-block;background:#eef4ff;color:#184f83;border-radius:999px;padding:2px 7px;margin:2px 3px 0 0;font-size:11px}.empty{padding:38px;text-align:center;color:#98a2b3}.group-row td{background:#eef2f6!important;font-weight:700;color:#344054}.danger{color:#b42318}.ok{color:#1d7f45}.right{margin-left:auto}.hidden-file{display:none}.region-select{width:120px;height:30px;border:1px solid #cfd7e2;border-radius:6px;background:#fff;color:#344054;font-size:12px}.stats-panel[hidden]{display:none}.stats-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.chart{border:1px solid #dde3ea;border-radius:8px;background:#fbfcfd;padding:12px;min-height:260px;max-height:520px;overflow:auto}.chart h3{margin-bottom:10px}.bar-row{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;margin:8px 0}.bar-label{font-size:12px;color:#344054;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-lines{display:grid;gap:3px}.bar-track{height:18px;background:#e9eef5;border-radius:4px;overflow:hidden;position:relative}.bar-fill{height:100%;background:#2b6ca3}.bar-fill.amount{background:#1d8a5b}.bar-text{position:absolute;left:6px;top:1px;font-size:11px;color:#102033;white-space:nowrap}.stats-note{color:#667085;font-size:12px}.stats-total{display:flex;gap:14px;flex-wrap:wrap;color:#344054;font-size:13px}@media(max-width:920px){.app{padding:14px}.top{align-items:flex-start;flex-direction:column}.upload,.summary{grid-template-columns:1fr}.toolbar input{width:100%;min-width:0}.right{margin-left:0}.stats-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div>
        <h1>S2B 검색 결과 확인하기</h1>
        <p>로컬 Python 크롤러가 만든 결과 HTML을 누적 관리합니다.</p>
      </div>
          <button id="statsBtn" class="btn primary">통계</button>
    </div>


    <section id="statsPanel" class="section stats-panel" hidden>
      <div class="stats-head"><div><h2>통계</h2><p class="stats-note">현재 누적 데이터 기준</p></div><button id="statsCloseBtn" class="btn">닫기</button></div>
      <div id="statsTotal" class="stats-total" style="margin-bottom:12px"></div>
      <div class="stats-grid"><div id="regionChart" class="chart"></div><div id="counterpartChart" class="chart"></div><div id="monthChart" class="chart"></div></div>
    </section>

    <section id="cumulative" class="panel active">
      <div class="section">
        <div class="toolbar">
          <input id="cumSearch" placeholder="검색 결과 검색">
          <label class="check"><input id="todayOnly" type="checkbox" checked>오늘만 보기</label>
          <input id="cumFrom" type="date" title="시작일">
          <input id="cumTo" type="date" title="종료일">
          <select id="cumSchool">
            <option value="all">전체 기관</option><option value="초">초등학교</option><option value="중">중학교</option><option value="고">고등학교</option><option value="기타">기타</option>
          </select>
          <select id="cumGroup">
            <option value="none">묶지 않음</option><option value="counterpart">계약대상자별 묶기</option><option value="institution">계약기관별 묶기</option>
          </select>
          <button id="exportBtn" class="btn">JSON 내보내기</button>
          <button id="importJsonBtn" class="btn">JSON 가져오기</button>
          <input id="jsonInput" class="hidden-file" type="file" accept=".json,application/json">
          <button id="clearBtn" class="btn warn right">누적 초기화</button>
        </div>
        <div class="filters"><div class="keyword-box"><h3>키워드 필터</h3><div id="cumKeywordFilters" class="keyword-list"></div></div></div>
        <div class="summary" style="margin-bottom:12px">
          <div class="metric"><span>누적 결과</span><strong id="cumTotal">0</strong></div>
          <div class="metric"><span>현재 표시</span><strong id="cumVisible">0</strong></div>
          <div class="metric"><span>계약대상자</span><strong id="counterpartTotal">0</strong></div>
          <div class="metric"><span>마지막 반영</span><strong id="lastImported">-</strong></div>
        </div>
        <div id="cumTable" class="table-wrap"></div>
      </div>
    </section>
  </main>

  <script>
    const STORE_KEY = "s2b_cumulative_records_v1";
    const META_KEY = "s2b_cumulative_meta_v1";
    const SHARED_DATA_URL = "s2b_cumulative.json";
    const state = { cumulative: loadRecords(), meta: loadMeta() };
    const $ = (id) => document.getElementById(id);

    function loadRecords(){try{const parsed=JSON.parse(localStorage.getItem(STORE_KEY)||"[]");return Array.isArray(parsed)?parsed:[]}catch{return[]}}
    function loadMeta(){try{return JSON.parse(localStorage.getItem(META_KEY)||"{}")||{}}catch{return{}}}
    function saveRecords(){localStorage.setItem(STORE_KEY,JSON.stringify(state.cumulative));localStorage.setItem(META_KEY,JSON.stringify(state.meta))}
    function normalizeRecord(record){return{...record,id:record.id||record.tender_no||hashString(record.contract_name+record.institution+record.contract_date),school_level:record.school_level||schoolLevel(record.institution)}}
    async function loadSharedData(){try{const response=await fetch(SHARED_DATA_URL,{cache:"no-store"});if(!response.ok)return;const data=await response.json();const records=Array.isArray(data)?data:data.records;if(!Array.isArray(records)||!records.length)return;state.cumulative=records.map(normalizeRecord).sort(compareRecords);state.meta=data.meta||state.meta||{};saveRecords()}catch{}}
    function compareRecords(a,b){return String(b.last_imported_at||"").localeCompare(String(a.last_imported_at||""))||String(b.contract_date||"").localeCompare(String(a.contract_date||""))||String(a.contract_name||"").localeCompare(String(b.contract_name||""),"ko")}
    function schoolLevel(institution){const text=institution||"";if(text.includes("초등학교")||/(^|[^가-힣])초($|[^가-힣])/.test(text))return"초";if(text.includes("중학교")||/(^|[^가-힣])중($|[^가-힣])/.test(text))return"중";if(text.includes("고등학교")||/(^|[^가-힣])고($|[^가-힣])/.test(text))return"고";return"기타"}

    function selectedKeywords(containerId){const boxes=[...document.querySelectorAll(`#${containerId} input[type=checkbox]`)];const checked=boxes.filter(box=>box.checked).map(box=>box.value);return checked.length===boxes.length?[]:checked}
    function filterRecords(records, options){const q=$(options.searchId).value.trim().toLowerCase();const school=$(options.schoolId).value;const keywords=options.keywordBoxId?selectedKeywords(options.keywordBoxId):[];const from=options.fromId&&$(options.fromId).value?dateInputComparable($(options.fromId).value):"";const to=options.toId&&$(options.toId).value?dateInputComparable($(options.toId).value):"";const todayOnly=options.todayOnlyId?$(options.todayOnlyId).checked:false;const today=dateStampDash();return records.filter(record=>{const schoolOk=school==="all"||record.school_level===school;const textOk=!q||recordText(record).includes(q);const keywordOk=!keywords.length||keywords.some(keyword=>(record.keywords||[]).includes(keyword));const d=dateComparable(record.contract_date);const dateOk=(!from||d>=from)&&(!to||d<=to);const importOk=!todayOnly||String(record.last_imported_at||"").startsWith(today);return schoolOk&&textOk&&keywordOk&&dateOk&&importOk})}
    function recordText(record){return[record.contract_name,record.tender_no,record.institution,record.counterpart,record.amount,record.contract_date,record.search_period_from,record.search_period_to,...(record.keywords||[])].join(" ").toLowerCase()}

    function renderKeywordFilters(containerId, records, onChange){const container=$(containerId);const keywords=[...new Set(records.flatMap(record=>record.keywords||[]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko"));if(!keywords.length){container.innerHTML='<span class="muted">표시할 키워드가 없습니다.</span>';return}container.innerHTML=keywords.map(keyword=>`<label><input type="checkbox" value="${escapeAttr(keyword)}" checked>${escapeHtml(keyword)}</label>`).join("");container.querySelectorAll("input").forEach(input=>input.addEventListener("change",onChange))}
    const REGION_OPTIONS=["서울","부산","대구","인천","광주","대전","울산","세종","경기","강원","충북","충남","전북","전남","경북","경남","제주"];function regionSelect(options){return `<select class="region-select"><option value="">확인필요</option>${options}</select>`}function regionCell(record){const candidates=Array.isArray(record.region_candidates)?record.region_candidates:[];if(record.region_status==="ambiguous"&&candidates.length){const options=candidates.map((item,index)=>{const label=[item.region,item.district,item.school_name].filter(Boolean).join(" ");const title=item.address||label;return `<option value="candidate-${index}" title="${escapeAttr(title)}">${escapeHtml(label||"후보")}</option>`}).join("");return regionSelect(options)}if(record.region){return `<span class="tag">${escapeHtml(record.region)}</span>`}const options=REGION_OPTIONS.map(region=>`<option value="${escapeAttr(region)}">${escapeHtml(region)}</option>`).join("");return regionSelect(options)}    function renderTable(targetId,records,groupMode){if(!records.length){$(targetId).innerHTML='<div class="empty">표시할 결과가 없습니다.</div>';return}const groups=buildGroups(records,groupMode);let no=1;let html='<table><thead><tr><th>No</th><th>계약명</th><th>계약기관</th><th>지역</th><th>구분</th><th>계약대상자</th><th>금액</th><th>계약체결일</th><th>키워드</th><th>반영횟수</th></tr></thead><tbody>';groups.forEach(group=>{if(group.title)html+=`<tr class="group-row"><td colspan="10">${escapeHtml(group.title)} · ${group.rows.length}건</td></tr>`;group.rows.forEach(record=>{const name=record.link?`<a class="link" href="${escapeAttr(record.link)}" target="_blank" rel="noopener">${escapeHtml(record.contract_name)}</a>`:escapeHtml(record.contract_name);const tags=(record.keywords||[]).map(keyword=>`<span class="tag">${escapeHtml(keyword)}</span>`).join("");html+=`<tr><td class="center">${no++}</td><td>${name}<div class="muted">${escapeHtml(record.tender_no||record.id||"")}</div></td><td>${escapeHtml(record.institution||"")}</td><td>${regionCell(record)}</td><td class="center">${escapeHtml(record.school_level||"기타")}</td><td>${escapeHtml(record.counterpart||"")}</td><td class="num">${escapeHtml(record.amount||"")}</td><td class="center">${escapeHtml(record.contract_date||"")}</td><td>${tags}</td><td class="center">${escapeHtml(String(record.import_count||""))}</td></tr>`})});html+='</tbody></table>';$(targetId).innerHTML=html}
    function buildGroups(records,mode){if(mode==="none")return[{title:"",rows:records}];const field=mode==="institution"?"institution":"counterpart";const fallback=mode==="institution"?"계약기관 미기재":"계약대상자 미기재";const map=new Map();records.forEach(record=>{const key=record[field]||fallback;if(!map.has(key))map.set(key,[]);map.get(key).push(record)});return[...map.entries()].sort((a,b)=>b[1].length-a[1].length||a[0].localeCompare(b[0],"ko")).map(([title,rows])=>({title,rows}))}
    function renderCumulative(){const rows=filterRecords(state.cumulative,{searchId:"cumSearch",schoolId:"cumSchool",keywordBoxId:"cumKeywordFilters",fromId:"cumFrom",toId:"cumTo",todayOnlyId:"todayOnly"});const counterpartCount=new Set(rows.map(record=>record.counterpart).filter(Boolean)).size;$("cumTotal").textContent=state.cumulative.length;$("cumVisible").textContent=rows.length;$("counterpartTotal").textContent=counterpartCount;$("lastImported").textContent=state.meta.lastImportedAt||"-";renderTable("cumTable",rows,$("cumGroup").value)}
    function exportJson(){const payload={exported_at:nowText(),records:state.cumulative,meta:state.meta};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const link=document.createElement("a");link.href=url;link.download=`s2b_cumulative_${dateStamp()}.json`;link.click();URL.revokeObjectURL(url)}
    async function importJsonFile(file){if(!file)return;try{const data=JSON.parse(await file.text());const records=Array.isArray(data)?data:data.records;if(!Array.isArray(records))throw new Error("records 배열을 찾지 못했습니다.");state.cumulative=records.map(normalizeRecord).sort(compareRecords);state.meta=data.meta||state.meta||{};state.meta.lastImportedAt=state.meta.lastImportedAt||nowText();saveRecords();renderKeywordFilters("cumKeywordFilters",state.cumulative,renderCumulative);renderCumulative()}catch(error){alert(error.message||"JSON을 가져오지 못했습니다.")}}
    function clearCumulative(){if(!confirm("누적 데이터를 초기화할까요? 브라우저에 저장된 데이터가 삭제됩니다."))return;state.cumulative=[];state.meta={};saveRecords();renderKeywordFilters("cumKeywordFilters",state.cumulative,renderCumulative);renderCumulative()}

    function amountNumber(value){return Number(String(value||"").replace(/[^0-9.-]/g,""))||0}
    function formatAmount(value){const n=Number(value)||0;if(n>=100000000)return `${(n/100000000).toFixed(1)}억`;if(n>=10000)return `${Math.round(n/10000).toLocaleString()}만`;return n.toLocaleString()}
    function regionKey(record){return record.region||"확인필요"}
    function monthKey(record){const match=String(record.contract_date||"").match(/(20\d{2})[.\-\/]?(\d{2})/);return match?`${match[1]}-${match[2]}`:"날짜없음"}
    function aggregateRecords(records,keyFn){const map=new Map();records.forEach(record=>{const key=keyFn(record)||"확인필요";const item=map.get(key)||{label:key,count:0,amount:0};item.count+=1;item.amount+=amountNumber(record.amount);map.set(key,item)});return [...map.values()]}
    function renderBarChart(targetId,title,rows,options={}){const target=$(targetId);const limit=options.limit||rows.length;const sorted=[...rows].sort(options.sort||((a,b)=>b.count-a.count||b.amount-a.amount));const visible=sorted.slice(0,limit);const maxCount=Math.max(1,...visible.map(row=>row.count));const maxAmount=Math.max(1,...visible.map(row=>row.amount));if(!visible.length){target.innerHTML=`<h3>${escapeHtml(title)}</h3><div class="empty">통계 데이터가 없습니다.</div>`;return}const body=visible.map(row=>{const countWidth=Math.max(4,row.count/maxCount*100);const amountWidth=Math.max(4,row.amount/maxAmount*100);return `<div class="bar-row"><div class="bar-label" title="${escapeAttr(row.label)}">${escapeHtml(row.label)}</div><div class="bar-lines"><div class="bar-track"><div class="bar-fill" style="width:${countWidth}%"></div><span class="bar-text">${row.count.toLocaleString()}건</span></div><div class="bar-track"><div class="bar-fill amount" style="width:${amountWidth}%"></div><span class="bar-text">${formatAmount(row.amount)}원</span></div></div></div>`}).join("");target.innerHTML=`<h3>${escapeHtml(title)}</h3>${body}`}
    function renderStats(){const records=state.cumulative;const totalAmount=records.reduce((sum,record)=>sum+amountNumber(record.amount),0);const needRegion=records.filter(record=>!record.region).length;$("statsTotal").innerHTML=`<strong>총 ${records.length.toLocaleString()}건</strong><strong>총 ${formatAmount(totalAmount)}원</strong><span>지역 확인필요 ${needRegion.toLocaleString()}건</span>`;renderBarChart("regionChart","지역별 계약 건수/금액",aggregateRecords(records,regionKey),{sort:(a,b)=>b.count-a.count||b.amount-a.amount});renderBarChart("counterpartChart","계약대상자별 계약 건수/금액",aggregateRecords(records,record=>record.counterpart||"계약대상자 미기재"),{sort:(a,b)=>b.amount-a.amount||b.count-a.count});renderBarChart("monthChart","월별 계약 건수/금액",aggregateRecords(records,monthKey),{sort:(a,b)=>String(a.label).localeCompare(String(b.label))})}
    function openStats(){renderStats();$("statsPanel").hidden=false;$("statsPanel").scrollIntoView({behavior:"smooth",block:"start"})}    function cleanText(value){return String(value||"").replace(/\s+/g," ").trim()}function nowText(){const d=new Date();const pad=n=>String(n).padStart(2,"0");return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}function dateStamp(){const d=new Date();const pad=n=>String(n).padStart(2,"0");return`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`}function dateStampDash(){const d=new Date();const pad=n=>String(n).padStart(2,"0");return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function dateInputToLabel(value){return value?value.replaceAll("-","."):""}function dateInputComparable(value){return value?value.replaceAll("-",""):""}function dateComparable(value){const match=String(value||"").match(/(20\d{2})[.\-\/]?(\d{2})[.\-\/]?(\d{2})/);return match?`${match[1]}${match[2]}${match[3]}`:""}function hashString(value){let hash=5381;for(let i=0;i<value.length;i+=1){hash=((hash<<5)+hash)+value.charCodeAt(i);hash>>>=0}return`local-${hash.toString(16)}`}function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}function escapeAttr(value){return escapeHtml(value).replace(/`/g,"&#96;")}
    $("statsBtn").addEventListener("click",openStats);$("statsCloseBtn").addEventListener("click",()=>$("statsPanel").hidden=true);$("exportBtn").addEventListener("click",exportJson);$("importJsonBtn").addEventListener("click",()=>$("jsonInput").click());$("jsonInput").addEventListener("change",event=>importJsonFile(event.target.files[0]));$("clearBtn").addEventListener("click",clearCumulative);
    ["cumSearch","cumSchool","cumGroup","cumFrom","cumTo","todayOnly"].forEach(id=>$(id).addEventListener("input",renderCumulative));
    async function initApp(){renderKeywordFilters("cumKeywordFilters",state.cumulative,renderCumulative);renderCumulative();await loadSharedData();renderKeywordFilters("cumKeywordFilters",state.cumulative,renderCumulative);renderCumulative();if(!$("statsPanel").hidden)renderStats()}
    initApp();
  </script>
</body>
</html>
